name: Lint & Typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        id: nvm
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - run: npm ci
      - run: npm run biome:ci
      - run: npm run lint
      - run: npm run build
        env:
          KONTENT_ENVIRONMENT_ID: 1cd72110-0fa9-0079-fcf1-8d925301887a
          KONTENT_DELIVERY_API_KEY: ci-stub
